<?xml version="1.0" encoding="UTF-8"?>
<!-- 轻账 Icon v1 · 呼吸 — 单周期完整波，均衡对称 -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#80C8E8"/>
      <stop offset="100%" stop-color="#45C5BA"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="#FFFFFF"/>

  <!-- Single sine wave: rises then falls, centered at y=256, amplitude=76 -->
  <path
    d="M 80,256 C 143,180 193,180 256,256 C 319,332 369,332 432,256"
    stroke="url(#g)"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />
</svg>
