<?xml version="1.0" encoding="UTF-8"?>
<!-- 轻账 Icon v2 · 律动 — 双周期波，节奏感更强 -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#80C8E8"/>
      <stop offset="100%" stop-color="#45C5BA"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="114" fill="#FFFFFF"/>

  <!-- Two sine periods, amplitude=54, x from 64 to 448 -->
  <path
    d="M 64,256
       C 99,202 125,202 160,256
       C 195,310 221,310 256,256
       C 291,202 317,202 352,256
       C 387,310 413,310 448,256"
    stroke="url(#g)"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />
</svg>
